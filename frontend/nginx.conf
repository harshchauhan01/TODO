server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for client-side routes like /todo
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reduce noise when browser requests favicon.ico but only svg exists
    location = /favicon.ico {
        try_files /favicon.ico /favicon.svg =204;
        access_log off;
        log_not_found off;
    }
}
